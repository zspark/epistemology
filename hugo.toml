baseURL = 'https://zspark.github.io/'
languageCode = 'en-us'
title = 'My Personal Blog'
theme = 'PaperMod'

[params]
    defaultTheme = "auto" # Automatically switches between light and dark mode
    showCodeCopyButtons = true

    # Profile Mode (Homepage setup)
    [params.profileMode]
        enabled = true
        title = "Welcome to My Site 👋"
        subtitle = "This is where I publish my latest thoughts and posts."
        imageUrl = "https://github.com/yourusername.png" # Pulls your GitHub avatar

    # Social icons on the home page
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/yourusername"
    [[params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/"
